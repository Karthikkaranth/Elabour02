<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#9fb9d3);
display:flex;
justify-content:center;
align-items:center;
}

/* Reduced container padding */
.container{
background:#ffffff;
width:520px;
padding:40px;
border-radius:22px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.18);
}

/* Reduced logo spacing */
.logo{
width:200px;
margin-bottom:10px;
}

/* Reduced heading spacing */
h1{
font-size:24px;
margin-bottom:15px;
color:#1565c0;
}

/* Reduced input spacing */
.input-box{
width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.signup-btn{
width:100%;
padding:16px;
margin-top:15px;
border-radius:12px;
font-size:17px;
font-weight:600;
cursor:pointer;
border:none;
background:#1565c0;
color:white;
transition:0.3s;
}

.signup-btn:hover{
background:#0d47a1;
}

/* Alert message styling */

.alert{
margin-top:15px;
padding:12px;
border-radius:10px;
font-size:15px;
font-weight:500;
display:none;
}

.alert-success{
background:#e8f5e9;
color:#2e7d32;
border:1px solid #a5d6a7;
}

.alert-error{
background:#ffebee;
color:#c62828;
border:1px solid #ef9a9a;
}

</style>
</head>

<body>

<div class="container">

<img src="../static/images/logo.JPG" class="logo">
<h1>Create Account</h1>

<form action="/register" method="POST" onsubmit="return registerUser()">

<input type="text" placeholder="Enter Username" name="username" class="input-box" required>

<input type="text" id="mobile" name="mobile" maxlength="10" placeholder="Enter 10-digit mobile number" class="input-box" required>

<button type="submit" class="signup-btn">Sign Up</button>

<div id="message" class="alert"></div>

</form>

</div>

<script>

function registerUser(){

let username = document.querySelector('input[name="username"]').value.trim();
let mobile = document.getElementById("mobile").value.trim();
let message = document.getElementById("message");

let phonePattern = /^[0-9]{10}$/;
let usernamePattern = /^[A-Za-z\s]+$/;

message.style.display="block";

/* Username empty check */

if(username === ""){
message.className="alert alert-error";
message.innerText="❌ Username cannot be empty";
return false;
}

/* Username number check */

if(!usernamePattern.test(username)){
message.className="alert alert-error";
message.innerText="❌ Username must contain letters only";
return false;
}

/* Mobile number check */

if(!phonePattern.test(mobile)){
message.className="alert alert-error";
message.innerText="❌ Mobile number must be exactly 10 digits";
return false;
}

/* Success */

message.className="alert alert-success";
message.innerText="✅ Account Created Successfully";

/* Delay submit */

setTimeout(function(){
document.querySelector("form").submit();
},1000);

return false;

}

</script>

</body>
</html>
