<!-- Declares the document as HTML5 -->
<!DOCTYPE html>

<!-- Root HTML element with English language -->
<html lang="en">

<head>

<!-- Defines UTF-8 character encoding -->
<meta charset="UTF-8">

<!-- Browser tab title -->
<title>E-Labour | Sign Up</title>

<!-- Makes page responsive on mobile devices -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Applies to all elements */
*{

/* Includes padding and border inside total width/height */
box-sizing:border-box;

/* Default font for the entire page */
font-family:"Segoe UI",Tahoma,sans-serif;

}

/* Page body styling */
body{

/* Removes default browser margin */
margin:0;

/* Full viewport height */
height:100vh;

/* Blue gradient background */
background:linear-gradient(135deg,#dbefff,#9fb9d3);

/* Flexbox layout */
display:flex;

/* Centers content horizontally */
justify-content:center;

/* Centers content vertically */
align-items:center;
}

/* Main signup card container */
.container{

/* White background */
background:#ffffff;

/* Container width */
width:520px;

/* Inner spacing */
padding:40px;

/* Rounded corners */
border-radius:22px;

/* Center-align text */
text-align:center;

/* Shadow effect */
box-shadow:0 12px 35px rgba(0,0,0,0.18);
}

/* Logo image styling */
.logo{

/* Logo width */
width:200px;

/* Space below logo */
margin-bottom:10px;
}

/* Page heading */
h1{

/* Font size */
font-size:24px;

/* Space below heading */
margin-bottom:15px;

/* Blue color */
color:#1565c0;
}

/* Input field styling */
.input-box{

/* Full width */
width:100%;

/* Internal spacing */
padding:14px;

/* Vertical spacing */
margin:8px 0;

/* Rounded corners */
border-radius:10px;

/* Light gray border */
border:1px solid #ccc;

/* Text size */
font-size:16px;
}

/* Sign up button styling */
.signup-btn{

/* Full width button */
width:100%;

/* Internal spacing */
padding:16px;

/* Top spacing */
margin-top:15px;

/* Rounded corners */
border-radius:12px;

/* Font size */
font-size:17px;

/* Semi-bold text */
font-weight:600;

/* Hand cursor */
cursor:pointer;

/* Remove default border */
border:none;

/* Blue background */
background:#1565c0;

/* White text */
color:white;

/* Smooth hover transition */
transition:0.3s;
}

/* Hover effect for signup button */
.signup-btn:hover{

/* Darker blue color on hover */
background:#0d47a1;
}

/* Alert message styling */
.alert{

/* Space above alert */
margin-top:15px;

/* Internal spacing */
padding:12px;

/* Rounded corners */
border-radius:10px;

/* Font size */
font-size:15px;

/* Medium font weight */
font-weight:500;

/* Hidden initially */
display:none;
}

/* Success alert styling */
.alert-success{

/* Light green background */
background:#e8f5e9;

/* Green text */
color:#2e7d32;

/* Green border */
border:1px solid #a5d6a7;
}

/* Error alert styling */
.alert-error{

/* Light red background */
background:#ffebee;

/* Red text */
color:#c62828;

/* Red border */
border:1px solid #ef9a9a;
}

</style>
</head>

<body>

<!-- Main signup container -->
<div class="container">

<!-- Application logo -->
<img src="../static/images/logo.JPG" class="logo">

<!-- Signup page heading -->
<h1>Create Account</h1>

<!-- Registration form
     Sends data to /register route -->
<form action="/register" method="POST" onsubmit="return registerUser()">

<!-- Username input field -->
<input
type="text"
placeholder="Enter Username"
name="username"
class="input-box"
required>

<!-- Mobile number input field -->
<input
type="text"
id="mobile"
name="mobile"
maxlength="10"
placeholder="Enter 10-digit mobile number"
class="input-box"
required>

<!-- Submit button -->
<button type="submit" class="signup-btn">
Sign Up
</button>

<!-- Message box for success/error alerts -->
<div id="message" class="alert"></div>

</form>

</div>

<script>

/* Registration validation function
   Runs when form is submitted */
function registerUser(){

/* Gets username value and removes spaces */
let username =
document.querySelector('input[name="username"]')
.value.trim();

/* Gets mobile number value */
let mobile =
document.getElementById("mobile")
.value.trim();

/* Gets alert message element */
let message =
document.getElementById("message");

/* Regex pattern for exactly 10 digits */
let phonePattern = /^[0-9]{10}$/;

/* Regex pattern:
   Username must contain both letters and numbers */
let usernamePattern =
/^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+$/;

/* Makes alert visible */
message.style.display="block";

/* Username empty check */
if(username === ""){

message.className="alert alert-error";

message.innerText=
"❌ Username cannot be empty";

return false;
}

/* Username validation */
if(!usernamePattern.test(username)){

message.className="alert alert-error";

message.innerText=
"❌ Username must contain Combination of letters and Numbers";

return false;
}

/* Mobile validation */
if(!phonePattern.test(mobile)){

message.className="alert alert-error";

message.innerText=
"❌ Mobile number must be exactly 10 digits";

return false;
}

/* Success message */
message.className="alert alert-success";

message.innerText=
"✅ Account Created Successfully";

/* Delay form submission
   Allows user to see success message */
setTimeout(function(){

    /* Submit form to Flask backend */
    document.querySelector("form").submit();

}, 2500);

/* Prevent immediate form submission */
return false;

}

</script>

</body>
</html>
