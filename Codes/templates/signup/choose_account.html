<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Account Type</title>

<style>

body{
    margin:0;
    height:100vh;
    background: linear-gradient(135deg, #e3f2fd, #90caf9);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Card Container */
.container{
    background:white;
    padding:50px 45px;
    border-radius:18px;
    text-align:center;
    width:420px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    transition:0.3s;
}

/* Slight hover lift */
.container:hover{
    transform:translateY(-5px);
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* Logo */
.logo{
    width:140px;
    margin-bottom:15px;
}

/* Heading */
h1{
    margin-bottom:30px;
    color:#0d47a1;
    font-size:24px;
    letter-spacing:0.5px;
}

/* Buttons */
.option{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:linear-gradient(135deg,#1565c0,#0d47a1);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s ease;
    box-shadow:0 6px 15px rgba(21,101,192,0.3);
}

/* Hover Effect */
.option:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(13,71,161,0.4);
}

/* Click Effect */
.option:active{
    transform:scale(0.97);
}

/* Optional subtle divider */
.divider{
    margin:20px 0;
    height:1px;
    background:#eee;
}

</style>
</head>

<body>

<div class="container">

<img src="../static/images/logo.JPG" class="logo">

<h1>Select Account Type</h1>

<button class="option"
onclick="window.location.href='/new'">
Create User Account
</button>

<button class="option"
onclick="window.location.href='/labour'">
Create Labour Account
</button>

</div>

</body>
</html>
