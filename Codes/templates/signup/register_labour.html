
<!DOCTYPE html>
<html>
<head>
<title>Labour Registration</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#b3d9ff);
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
}

.card{
background:white;
padding:50px;
border-radius:20px;
width:450px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:180px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0d47a1;
}

.error{
color:#d32f2f;
background:#ffebee;
padding:10px;
border-radius:6px;
margin-top:10px;
display:none;
font-size:14px;
}

.success{
color:#2e7d32;
background:#e8f5e9;
padding:10px;
border-radius:6px;
margin-top:10px;
display:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<img src="../static/images/logo.JPG" class="logo">

<h2>Create Labour Account</h2>
<form onsubmit="return registerUser()">
<input type="text" placeholder="Full Name" id="name">

<input type="text" placeholder="Mobile Number" id="phone" maxlength="10">

<select id="skill">
<option>Select Skill</option>
<option>Painter</option>
<option>Plumber</option>
<option>Electrician</option>
<option>Construction Worker</option>
</select>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
pattern="[0-9]{10}"
maxlength="10"
title="Enter exactly 10 digits"
required>

<button type="submit">Create Account</button>

</form>

<div id="errorMsg" class="error"></div>
<div id="successMsg" class="success"></div>

</div>

<script>

function registerUser(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;

let nameRegex = /^[A-Za-z ]+$/;
let mobileRegex = /^[0-9]{10}$/;

if(!nameRegex.test(name)){
alert("Name must contain letters only.");
return false;
}

if(!mobileRegex.test(mobile)){
alert("Mobile number must be exactly 10 digits.");
return false;
}

alert("Labour account created successfully");
window.location.href="/index";

return false;
}

</script>

</body>
</html>
