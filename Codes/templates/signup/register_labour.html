<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Worker Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#9fb9d3);
display:flex;
justify-content:center;
align-items:center;
}

/* Container */
.container{
background:#ffffff;
width:520px;
padding:40px;
border-radius:22px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.18);
}

/* Logo */
.logo{
width:200px;
margin-bottom:10px;
}

/* Heading */
h1{
font-size:24px;
margin-bottom:15px;
color:#1565c0;
}

/* Inputs */
.input-box{
width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

/* Button */
.signup-btn{
width:100%;
padding:16px;
margin-top:15px;
border-radius:12px;
font-size:17px;
font-weight:600;
cursor:pointer;
border:none;
background:#1565c0;
color:white;
transition:0.3s;
}

.signup-btn:hover{
background:#0d47a1;
}

/* Message */
.alert{
margin-top:15px;
padding:12px;
border-radius:10px;
font-size:15px;
font-weight:500;
display:none;
}

.alert-success{
background:#e8f5e9;
color:#2e7d32;
border:1px solid #a5d6a7;
}

.alert-error{
background:#ffebee;
color:#c62828;
border:1px solid #ef9a9a;
}

</style>
</head>

<body>

<div class="container">

<img src="../static/images/logo.JPG" class="logo">

<h1>Create Labour Account</h1>

<form id="workerForm">

<input type="text" id="name" class="input-box" placeholder="Username (letters + numbers)" required>

<input type="text" id="mobile" class="input-box" placeholder="Mobile Number" maxlength="10" required>

<select id="skill" class="input-box" required>
<option value="">Select Skill</option>
<option>Painter</option>
<option>Plumber</option>
<option>Electrician</option>
<option>Construction Worker</option>
</select>

<button type="submit" class="signup-btn">Create Account</button>

<div id="message" class="alert"></div>

</form>

</div>

<script>

document.getElementById("workerForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value.trim();
let mobile = document.getElementById("mobile").value.trim();
let skill = document.getElementById("skill").value;
let message = document.getElementById("message");

let nameRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+$/;
let mobileRegex = /^[0-9]{10}$/;

message.style.display="block";

/* Validation */
if(!nameRegex.test(name)){
message.className="alert alert-error";
message.innerText="❌ Username must contain letters and numbers";
return;
}

if(!mobileRegex.test(mobile)){
message.className="alert alert-error";
message.innerText="❌ Mobile number must be exactly 10 digits";
return;
}

if(skill === ""){
message.className="alert alert-error";
message.innerText="❌ Please select a skill";
return;
}

/* Send to backend */
fetch("/register_worker", {
method: "POST",
headers: {
"Content-Type": "application/x-www-form-urlencoded"
},
body: `name=${name}&mobile=${mobile}&skill=${skill}`
})
.then(res => res.text())
.then(data => {

if(data === "exists"){
message.className="alert alert-error";
message.innerText="❌ Worker already exists";
}
else if(data === "success"){
message.className="alert alert-success";
message.innerText="✅ Account created successfully";

/* Delay redirect */
setTimeout(()=>{
window.location.href = "/";
}, 3000);

}
else{
message.className="alert alert-error";
message.innerText="❌ Something went wrong";
}

});

});

</script>

</body>
</html>
