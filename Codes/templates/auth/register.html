<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;font-family:"Segoe UI",Tahoma;}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#b3d9ff);
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#fff;
width:460px;
padding:28px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.15);
text-align:center;
}

.logo{width:170px;margin-bottom:6px;}

.brand-title{
font-size:25px;
font-weight:800;
background:linear-gradient(90deg,#ff6a00,#0056b3);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{font-size:14px;color:#555;margin-bottom:12px;}

.form-group{text-align:left;margin-bottom:10px;}

label{font-size:13px;font-weight:600;}

input{
width:100%;
padding:11px;
border-radius:8px;
border:1px solid #ccc;
margin-top:4px;
}

input:focus{
border:1px solid #0077cc;
outline:none;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:9px;
background:linear-gradient(90deg,#0056b3,#0077cc);
color:#fff;
font-weight:600;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.btn:hover{
background:linear-gradient(90deg,#004a99,#0066b3);
}

.message{
display:none;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:13px;
text-align:left;
}

.error{
background:#ffe5e5;
border:1px solid #ff4d4d;
color:#b30000;
}

.success{
background:#e6fff2;
border:1px solid #00b359;
color:#006633;
}

.otp-section{
display:none;
margin-top:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
width:240px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.popup-otp{
font-size:26px;
font-weight:bold;
color:#1565c0;
margin:10px 0;
}

.ok-btn{
padding:6px 18px;
border:none;
background:#1565c0;
color:#fff;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<img src="../static/images/logo.JPG" class="logo">

<div class="brand-title">E-Labour Login</div>
<div class="subtitle">Enter your login details</div>

<div class="form-group">
<label>Full Name</label>
<input 
type="text"
id="username"
placeholder="Enter your name"
pattern="[A-Za-z ]+"
title="Name must contain only letters"
required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input 
type="tel"
id="phone"
placeholder="Enter 10 digit phone number"
maxlength="10"
pattern="[0-9]{10}"
title="Phone number must be exactly 10 digits"
required>
</div>

<div id="message" class="message"></div>

<button class="btn" onclick="sendOTP()">Send OTP</button>

<div class="otp-section" id="otpSection">

<div class="form-group">
<label>Enter OTP</label>
<input type="text" id="otp" maxlength="4" required>
</div>

<button class="btn" onclick="verifyOTP()">Verify & Login</button>

</div>

</div>

<!-- OTP POPUP -->

<div class="popup" id="otpPopup">
<div class="popup-box">

<div>Your OTP</div>
<div class="popup-otp" id="otpNumber"></div>

<button class="ok-btn" onclick="closeOtp()">OK</button>

</div>
</div>

<!-- SUCCESS POPUP -->

<div class="popup" id="welcomePopup">
<div class="popup-box">

<div style="font-weight:600">Login Successfully 🎉</div>
<div>Welcome to E-Labour</div>

</div>
</div>

<script>

let otp="";
let autoClose;

function showMessage(text,type){

let msg=document.getElementById("message");

msg.style.display="block";
msg.className="message "+type;
msg.innerText=text;

}

function sendOTP(){

let u=document.getElementById("username").value.trim();
let p=document.getElementById("phone").value.trim();

/* Name validation */

if(u===""){
showMessage("⚠ Name cannot be empty","error");
return;
}

if(!/^[A-Za-z ]+$/.test(u)){
showMessage("⚠ Name must contain letters only","error");
return;
}

/* Phone validation */

if(p===""){
showMessage("⚠ Phone number cannot be empty","error");
return;
}

if(!/^[0-9]{10}$/.test(p)){
showMessage("⚠ Phone number must contain exactly 10 digits","error");
return;
}

/* Send to Flask */

fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`username=${u}&mobile=${p}`
})
.then(r=>r.json())
.then(d=>{

if(d.status==="error"){
showMessage("❌ Wrong username or phone number","error");
return;
}

if(d.status==="success"){

showMessage("✔ OTP sent successfully","success");

otp=Math.floor(1000+Math.random()*9000);

document.getElementById("otpNumber").innerText=otp;

document.getElementById("otpPopup").style.display="flex";

document.getElementById("otpSection").style.display="block";

autoClose=setTimeout(()=>{
closeOtp();
},10000);

}

});

}

function closeOtp(){
document.getElementById("otpPopup").style.display="none";
clearTimeout(autoClose);
}

function verifyOTP(){

let e=document.getElementById("otp").value;

if(e===""){
showMessage("⚠ Please enter OTP","error");
return;
}

if(e==otp){

document.getElementById("welcomePopup").style.display="flex";

setTimeout(()=>{
window.location.href="/role";
},3000);

}else{

showMessage("❌ Invalid OTP","error");

}

}

</script>

</body>
</html>
