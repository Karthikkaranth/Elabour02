<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
background:linear-gradient(135deg,#eef4ff,#fdfdfd);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:240px;height:100vh;background:#1e2a38;color:white;
padding:25px;display:flex;flex-direction:column;justify-content:space-between;
}

.logo{width:80px;height:80px;border-radius:50%;border:3px solid #ff7a00;}

.sidebar ul{list-style:none;}
.sidebar ul li{
padding:14px;margin:10px 0;cursor:pointer;border-radius:8px;
}
.sidebar ul li:hover{background:#2f3f52;}

.logout-btn{
background:#ff4d4d;padding:12px;border-radius:8px;cursor:pointer;text-align:center;
}

/* MAIN */
.main{flex:1;padding:30px;}

.header{margin-bottom:30px;}
.header h1{color:#1e2a38;}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;padding:20px;border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn{
margin-top:10px;padding:8px 12px;border:none;
border-radius:8px;background:#ff7a00;color:white;cursor:pointer;
}

.delete{background:red;}
.edit{background:#007bff;}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;align-items:center;
}

.modal-content{
background:white;padding:25px;border-radius:12px;width:450px;
}

/* TABLE STYLE */
.details-table{
width:100%;
border-collapse:collapse;
margin-bottom:15px;
}

.details-table td{
padding:8px;
border-bottom:1px solid #ddd;
}

.details-table td:first-child{
font-weight:bold;
color:#333;
width:40%;
}

.input{
width:100%;
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

</style>
</head>

<body>

<div class="sidebar">
<div>
<img src="../static/images/logo.JPG" class="logo">
<ul>
<li onclick="showSection('dashboard')">🏠 Dashboard</li>
<li onclick="window.location.href='/post'">📢 Post Work</li>
<li onclick="showSection('jobs')">📄 My Work Posts</li>
<li onclick="showSection('applications')">📬 Labour Requests</li>
</ul>
</div>

<div class="logout-btn" onclick="logout()">Logout</div>
</div>

<div class="main">

<div class="header">
<h1>Contractor Dashboard 👷</h1>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="cards">
<div class="card">
<h3>Post Work</h3>
<button class="btn" onclick="window.location.href='/post'">Post Now</button>
</div>

<div class="card">
<h3>Manage Jobs</h3>
<button class="btn" onclick="showSection('jobs')">Open</button>
</div>
</div>
</div>

<!-- MY POSTS -->
<div id="jobs" class="section" style="display:none;">
<h2>My Work Posts</h2><br>
<div class="cards" id="jobContainer"></div>
</div>

</div>

<!-- 🔥 MODAL WITH TABLE UI -->
<div class="modal" id="modal">
<div class="modal-content">

<h3 id="modalTitle"></h3>

<table class="details-table">
<tr><td>Name</td><td><input id="edit_name" class="input"></td></tr>
<tr><td>Phone</td><td><input id="edit_phone" class="input"></td></tr>
<tr><td>Address</td><td><input id="edit_address" class="input"></td></tr>
<tr><td>Location</td><td><input id="edit_location" class="input"></td></tr>
<tr><td>Date</td><td><input id="edit_date" class="input"></td></tr>
<tr><td>Skills</td><td><input id="edit_skills" class="input"></td></tr>
<tr><td>Start Time</td><td><input id="edit_start" class="input"></td></tr>
<tr><td>End Time</td><td><input id="edit_end" class="input"></td></tr>
</table>

<button class="btn edit" onclick="updatePost()">Update</button>
<button class="btn delete" onclick="deletePost()">Delete</button>
<button class="btn" onclick="closeModal()">Close</button>

</div>
</div>

<script>

let currentPostId=null;

async function loadPosts(){
let res=await fetch("/my_posts");
let posts=await res.json();

let container=document.getElementById("jobContainer");
container.innerHTML="";

posts.forEach(p=>{
container.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.location}</p>
<button class="btn" onclick="viewDetails('${p._id}')">View More</button>
</div>`;
});
}

async function viewDetails(id){

currentPostId=id;

let res=await fetch("/my_posts");
let posts=await res.json();
let post=posts.find(p=>p._id===id);

edit_name.value=post.name||"";
edit_phone.value=post.phone||"";
edit_address.value=post.address||"";
edit_location.value=post.location||"";
edit_date.value=post.date||"";
edit_skills.value=post.skills||"";
edit_start.value=post.start_time||"";
edit_end.value=post.end_time||"";

modalTitle.innerText=post.name;
modal.style.display="flex";
}

async function updatePost(){

let data={
name:edit_name.value,
phone:edit_phone.value,
address:edit_address.value,
location:edit_location.value,
date:edit_date.value,
skills:edit_skills.value,
start_time:edit_start.value,
end_time:edit_end.value
};

await fetch(`/update_post/${currentPostId}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Updated!");
closeModal();
loadPosts();
}

async function deletePost(){

if(!confirm("Delete?")) return;

await fetch(`/delete_post/${currentPostId}`);
alert("Deleted!");
closeModal();
loadPosts();
}

function closeModal(){
modal.style.display="none";
}

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function logout(){
window.location.href="/";
}

loadPosts();

</script>

</body>
</html>
