<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
background:linear-gradient(135deg,#eef4ff,#fdfdfd);
display:flex;
}

/* TOP RIGHT BUTTONS */
.top-bar{
position:fixed;
top:15px;
right:25px;
display:flex;
gap:10px;
z-index:1000;
}

.top-btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.top-btn:hover{transform:scale(1.05);}
.logout-top{background:#ff4d4d;color:white;}
.about-btn{background:#007bff;color:white;}

/* SIDEBAR */
.sidebar{
width:240px;height:100vh;background:#1e2a38;color:white;
padding:25px;display:flex;flex-direction:column;justify-content:space-between;
}

.logo{width:80px;height:80px;border-radius:50%;border:3px solid #ff7a00;}

.sidebar ul{list-style:none;}
.sidebar ul li{
padding:14px;margin:10px 0;cursor:pointer;border-radius:8px;
}
.sidebar ul li:hover{background:#2f3f52;}

/* MAIN */
.main{flex:1;padding:30px;}
.header{margin-bottom:30px;}

.section{display:none;}
#dashboard{display:block;}

/* TABLE */
.table-container{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
}

table{width:100%;border-collapse:collapse;}

th{
background:#1e3a8a;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

/* BUTTON */
.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.view{background:#007bff;}
.delete{background:red;}
.edit{background:#ff7a00;}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;align-items:center;
}

.modal-content{
background:white;padding:25px;border-radius:12px;width:450px;
}

/* 🔥 ALERT */
.alert-box{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:9999;
}

.alert-content{
background:white;
padding:25px;
border-radius:12px;
width:300px;
text-align:center;
}
</style>
</head>

<body>

<div class="top-bar">
<button class="top-btn about-btn">About</button>
<button class="top-btn logout-top" onclick="logout()">Logout</button>
</div>

<div class="sidebar">
<div>
<img src="../static/images/logo.JPG" class="logo">
<ul>
<li onclick="showSection('dashboard')">🏠 Dashboard</li>
<li onclick="window.location.href='/post'">📢 Post Work</li>
<li onclick="showSection('jobs')">📄 My Work Posts</li>
<li onclick="showSection('applications')">📬 Labour Requests</li>
</ul>
</div>
</div>

<div class="main">

<div class="header">
<!-- 🔥 USERNAME -->
<h1>{{ username }} Dashboard 👷</h1>
</div>

<div id="dashboard" class="section">
<h2>Welcome 👋</h2>
<p>This is your dashboard.</p>
</div>

<div id="jobs" class="section">
<h2>My Work Posts</h2><br>

<div class="table-container">
<table>
<thead>
<tr>
<th>Basic Info</th>
<th>Description</th>
<th>Salary Range</th>
<th>Skills</th>
<th>Time</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="jobTable"></tbody>
</table>
</div>
</div>

<div id="applications" class="section">
<h2>Labour Requests</h2>
<p>No requests yet.</p>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3 id="modalTitle"></h3>

<table>
<tr><td>Name</td><td><input id="edit_name"></td></tr>
<tr><td>Phone</td><td><input id="edit_phone"></td></tr>
<tr><td>Address</td><td><input id="edit_address"></td></tr>
<tr><td>Location</td><td><input id="edit_location"></td></tr>
<tr><td>Date</td><td><input id="edit_date"></td></tr>
<tr><td>Skills</td><td><input id="edit_skills"></td></tr>
<tr><td>Start</td><td><input id="edit_start"></td></tr>
<tr><td>End</td><td><input id="edit_end"></td></tr>
</table>

<button class="btn edit" onclick="updatePost()">Update</button>
<button class="btn delete" onclick="deletePost()">Delete</button>
<button class="btn delete" onclick="closeModal()">Close</button>

</div>
</div>

<!-- ALERT -->
<div class="alert-box" id="alertBox">
<div class="alert-content">
<h3 id="alertMsg"></h3><br>
<button class="btn view" onclick="closeAlert()">OK</button>
</div>
</div>

<script>

let currentPostId=null;

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function showAlert(msg){
alertMsg.innerText=msg;
alertBox.style.display="flex";
}

function closeAlert(){
alertBox.style.display="none";
}

async function loadPosts(){
let res=await fetch("/my_posts");
let posts=await res.json();

jobTable.innerHTML="";

posts.forEach(p=>{
jobTable.innerHTML+=`
<tr>
<td><b>${p.name}</b><br>${p.location}<br>${p.date}</td>
<td>${p.description||""}</td>
<td>₹${p.salary_min} to ₹${p.salary_max}</td>
<td>${(p.skills||[]).join(", ")}</td>
<td>${p.start_time} → ${p.end_time}</td>
<td><button class="btn view" onclick="viewDetails('${p._id}')">View</button></td>
</tr>`;
});
}

async function viewDetails(id){
currentPostId=id;
let res=await fetch("/my_posts");
let posts=await res.json();
let p=posts.find(x=>x._id===id);

edit_name.value=p.name;
edit_phone.value=p.phone;
edit_address.value=p.address;
edit_location.value=p.location;
edit_date.value=p.date;
edit_skills.value=(p.skills||[]).join(", ");
edit_start.value=p.start_time;
edit_end.value=p.end_time;

modal.style.display="flex";
}

async function updatePost(){
await fetch(`/update_post/${currentPostId}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:edit_name.value,
phone:edit_phone.value,
address:edit_address.value,
location:edit_location.value,
date:edit_date.value,
skills:edit_skills.value.split(",").map(s=>s.trim()),
start_time:edit_start.value,
end_time:edit_end.value
})
});

showAlert("Updated Successfully ✅");
closeModal();
loadPosts();
}

async function deletePost(){
await fetch(`/delete_post/${currentPostId}`);
showAlert("Deleted Successfully 🗑️");
closeModal();
loadPosts();
}

function closeModal(){modal.style.display="none";}
function logout(){window.location.href="/";}

loadPosts();

</script>

</body>
</html>
