<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Work - E-Labour</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:linear-gradient(135deg,#f0f4ff,#ffffff,#eef2ff);
    min-height:100vh;
    padding:30px;
}

/* TOP BAR */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.back-btn{
    background:#1e293b;
    color:white;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(14px);
    padding:40px;
    border-radius:18px;
    width:900px;
    max-width:100%;
    margin:auto;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* TITLE */
h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full{
    grid-column:1/-1;
}

label{
    font-size:13px;
    margin-bottom:6px;
    display:block;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #d1d5db;
}

input:focus, textarea:focus{
    border-color:#1e3a8a;
}

/* SKILLS (UNCHANGED) */
.skills{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.skill-chip{
    padding:10px;
    background:#eef2ff;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

.skill-chip.active{
    background:#1e3a8a;
    color:white;
}

/* TAG INPUT (OTHER SKILL) */
.tag-box{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-top:10px;
}

.tag{
    background:#1e3a8a;
    color:white;
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    display:flex;
    align-items:center;
    gap:6px;
}

.tag span{
    cursor:pointer;
}

.tag-input{
    border:none;
    outline:none;
    flex:1;
    min-width:120px;
}

/* SALARY */
.salary-box{
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
}

.range-values{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-weight:bold;
}

.salary-inputs{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.salary-inputs input{
    width:50%;
}

/* BUTTON */
.submit-btn{
    width:100%;
    padding:16px;
    background:#1e3a8a;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

@media(max-width:700px){
    .form-grid{
        grid-template-columns:1fr;
    }
}

/* ADD THIS AT END OF YOUR CSS */
.popup-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    align-items:center;
    visibility:hidden;
    opacity:0;
    transition:0.3s;
    z-index:999;
}

.popup{
    background:white;
    padding:25px;
    border-radius:14px;
    text-align:center;
    width:280px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.popup button{
    margin-top:12px;
    padding:8px 18px;
    border:none;
    background:#1e3a8a;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.popup-overlay.active{
    visibility:visible;
    opacity:1;
}



</style>

</head>

<body>

<div class="top-bar">
    <button class="back-btn" onclick="history.back()">← Back</button>
</div>

<div class="container">

<h2>Post New Work</h2>

<form onsubmit="submitForm(event)">

<div class="form-grid">

<div>
<label>Full Name</label>
<input type="text" required>
</div>

<div>
<label>Phone Number</label>
<input type="tel" pattern="[0-9]{10}" required>
</div>

<div class="full">
<label>Address</label>
<textarea required></textarea>
</div>

<div>
<label>Work Location</label>
<input type="text" required>
</div>

<div>
<label>Work Date</label>
<input type="date" id="workDate" required>
</div>

<!-- JOB DESCRIPTION -->
<div class="full">
<label>Job Description</label>
<textarea required></textarea>
</div>

<!-- SALARY -->
<div class="full">
<label>Salary Range (₹ per day)</label>

<div class="salary-box">

<div class="range-values">
<span id="minVal">₹500</span>
<span id="maxVal">₹2500</span>
</div>

<div class="salary-inputs">
<input type="number" id="minInput" value="500" min="500" max="2500">
<input type="number" id="maxInput" value="2500" min="500" max="2500">
</div>

<input type="range" id="minRange" min="500" max="2500" value="500">
<input type="range" id="maxRange" min="500" max="2500" value="2500">

</div>
</div>

<!-- SKILLS (ORIGINAL LIST PRESERVED) -->
<div class="full">
<h4>Select Required Skills</h4>

<div class="skills">
    <div class="skill-chip">Electrician</div>
    <div class="skill-chip">Plumber</div>
    <div class="skill-chip">Painter</div>
    <div class="skill-chip">Carpenter</div>
    <div class="skill-chip">Mason</div>
    <div class="skill-chip">Welder</div>
    <div class="skill-chip">Cleaner</div>
    <div class="skill-chip">Gardener</div>
    <div class="skill-chip">Helper</div>
    <div class="skill-chip">Technician</div>
</div>

<!-- OTHER SKILL -->
<div class="tag-box" id="tagBox">
<input type="text" class="tag-input" placeholder="Add other skill & press Enter">
</div>

</div>

<div>
<label>Start Time</label>
<input type="time" id="startTime" required>
</div>

<div>
<label>End Time</label>
<input type="time" id="endTime" required>
</div>

<div class="full">
<button class="submit-btn">Submit Work</button>
</div>

</div>
</form>
<!-- ADD THIS JUST BEFORE </body> (popup UI) -->
<div class="popup-overlay" id="popup">
    <div class="popup">
        <h3 id="popupTitle"></h3>
        <p id="popupMsg"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>
</div>

<script>

/* SKILL SELECT */
document.querySelectorAll(".skill-chip").forEach(chip=>{
    chip.onclick=()=>chip.classList.toggle("active");
});

/* TAG INPUT */
let tagBox=document.getElementById("tagBox");
let input=tagBox.querySelector("input");

input.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        e.preventDefault();
        if(input.value.trim()!==""){
            let tag=document.createElement("div");
            tag.className="tag";
            tag.innerHTML=input.value+" <span>×</span>";

            tag.querySelector("span").onclick=()=>tag.remove();

            tagBox.insertBefore(tag,input);
            input.value="";
        }
    }
});

/* SALARY SYNC */
let minRange=document.getElementById("minRange");
let maxRange=document.getElementById("maxRange");
let minInput=document.getElementById("minInput");
let maxInput=document.getElementById("maxInput");
let minVal=document.getElementById("minVal");
let maxVal=document.getElementById("maxVal");

function updateUI(){
    minVal.innerText="₹"+minRange.value;
    maxVal.innerText="₹"+maxRange.value;
    minInput.value=minRange.value;
    maxInput.value=maxRange.value;
}

minRange.oninput=()=>{
    if(+minRange.value>=+maxRange.value){
        minRange.value=maxRange.value-100;
    }
    updateUI();
};

maxRange.oninput=()=>{
    if(+maxRange.value<=+minRange.value){
        maxRange.value=+minRange.value+100;
    }
    updateUI();
};

minInput.oninput=()=>{
    minRange.value=minInput.value;
    updateUI();
};

maxInput.oninput=()=>{
    maxRange.value=maxInput.value;
    updateUI();
};

/* SUBMIT */
function submitForm(e){
    e.preventDefault();

    let start = document.getElementById("startTime").value;
    let end = document.getElementById("endTime").value;

    if(start >= end){
        alert("End time must be after start time!");
        return;
    }

    let skills = [];

    document.querySelectorAll(".skill-chip.active").forEach(s=>{
        skills.push(s.innerText);
    });

    // existing tags
document.querySelectorAll(".tag").forEach(tag=>{
    skills.push(tag.innerText.replace("×","").trim());
});

// 🔥 IMPORTANT: also capture input value if user didn't press Enter
let otherInput = document.querySelector(".tag-input").value.trim();

if(otherInput !== ""){
    skills.push(otherInput);
}

    let name = document.querySelector("input[type='text']").value;
    let phone = document.querySelector("input[type='tel']").value;
    let address = document.querySelectorAll("textarea")[0].value;
    let location = document.querySelectorAll("input")[2].value;
    let date = document.querySelector("input[type='date']").value;
    let description = document.querySelectorAll("textarea")[1].value;

    let salary_min = document.getElementById("minRange").value;
    let salary_max = document.getElementById("maxRange").value;

    fetch("/post_work", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            name,
            phone,
            address,
            location,
            date,
            description,
            salary_min,
            salary_max,
            skills,
            start_time:start,
            end_time:end
        })
    })
    .then(res=>res.json())
    .then(data=>{
        console.log(data); // debug
        if(data.status==="success"){

    showPopup(
        "Success",
        "Work Submitted Successfully ✅"
    );

    setTimeout(()=>{
        window.location.href="/cus";
    },2000);

}else{

    showPopup(
        "Error",
        data.message
    );

}
    })
    .catch(err=>{
        console.log(err);
        alert("Server error!");
    });
}
function showPopup(title,msg){
    document.getElementById("popupTitle").innerText = title;
    document.getElementById("popupMsg").innerText = msg;
    document.getElementById("popup").classList.add("active");
}

function closePopup(){
    document.getElementById("popup").classList.remove("active");
}


/* ALLOW ONLY TODAY AND FUTURE DATES */
document.getElementById("workDate").min =
new Date().toISOString().split("T")[0];
</script>

</body>
</html>
