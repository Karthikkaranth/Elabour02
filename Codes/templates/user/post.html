<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Work - E-Labour</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background: linear-gradient(135deg, #0f172a, #1e40af);
    min-height:100vh;
    padding:30px;
}

/* TOP BAR (OUTSIDE CARD) */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* BACK BUTTON */
.back-btn{
    background:#1f2937;
    border:none;
    color:#cbd5e1;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    transition:0.2s;
}

.back-btn:hover{
    background:#374151;
    color:white;
}

/* LOGO */
.logo{
    height:90px;
    width:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #ff7a00;
    box-shadow:0 6px 20px rgba(255,122,0,0.6);
}

/* CONTAINER */
.container{
    background:#111827;
    padding:40px;
    border-radius:18px;
    width:900px;
    max-width:100%;
    margin:auto;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:25px;
    color:#ff7a00;
    font-size:26px;
}

/* FORM GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* FULL WIDTH */
.full{
    grid-column:1 / -1;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #374151;
    background:#1f2937;
    color:white;
    outline:none;
    transition:0.2s;
}

input:focus, textarea:focus{
    border-color:#ff7a00;
}

/* LABEL */
label{
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:5px;
    display:block;
}

/* SECTION TITLE */
h4{
    margin:15px 0 10px;
    color:#ff7a00;
}

/* SKILLS GRID */
.skills{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.skill-chip{
    text-align:center;
    padding:10px;
    background:#1f2937;
    border-radius:10px;
    cursor:pointer;
    border:1px solid #374151;
    font-size:13px;
    transition:0.2s;
}

.skill-chip:hover{
    background:#374151;
}

.skill-chip.active{
    background:#ff7a00;
    border:none;
    font-weight:bold;
}

/* BUTTON */
.submit-btn{
    width:100%;
    padding:16px;
    border:none;
    background:#ff7a00;
    color:white;
    border-radius:12px;
    margin-top:20px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
    transition:0.2s;
}

.submit-btn:hover{
    background:#e56a00;
}

/* RESPONSIVE */
@media(max-width:700px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .skills{
        grid-template-columns:1fr 1fr;
    }

    .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}
}
</style>

</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <img src="../static/images/logo.JPG" class="logo">
</div>

<!-- FORM CARD -->
<div class="container">

<h2>Post New Work</h2>

<form onsubmit="submitForm(event)">

<div class="form-grid">

<div>
<label>Full Name</label>
<input type="text" required>
</div>

<div>
<label>Phone Number</label>
<input type="tel" pattern="[0-9]{10}" required>
</div>

<div class="full">
<label>Address</label>
<textarea required></textarea>
</div>

<div>
<label>Work Location</label>
<input type="text" required>
</div>

<div>
<label>Work Date</label>
<input type="date" required>
</div>

<div class="full">
<h4>Select Required Skills</h4>
<div class="skills">
    <div class="skill-chip">Electrician</div>
    <div class="skill-chip">Plumber</div>
    <div class="skill-chip">Painter</div>
    <div class="skill-chip">Carpenter</div>
    <div class="skill-chip">Mason</div>
    <div class="skill-chip">Welder</div>
    <div class="skill-chip">Cleaner</div>
    <div class="skill-chip">Gardener</div>
    <div class="skill-chip">Helper</div>
    <div class="skill-chip">Technician</div>
</div>
</div>

<div>
<label>Start Time</label>
<input type="time" id="startTime" required>
</div>

<div>
<label>End Time</label>
<input type="time" id="endTime" required>
</div>

<div class="full">
<button type="submit" class="submit-btn">Submit Work</button>
</div>

</div>

</form>

</div>

<script>
function goBack(){
    window.history.back();
}

document.querySelectorAll(".skill-chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
        chip.classList.toggle("active");
    });
});

function submitForm(e){
    e.preventDefault();

    let start = document.getElementById("startTime").value;
    let end = document.getElementById("endTime").value;

    if(start >= end){
        alert("End time must be after start time!");
        return;
    }

    let skills = [];
    document.querySelectorAll(".skill-chip.active").forEach(skill=>{
        skills.push(skill.innerText);
    });

    if(skills.length === 0){
        alert("Please select at least one skill!");
        return;
    }

    // GET FORM VALUES
    let name = document.querySelector("input[type='text']").value;
    let phone = document.querySelector("input[type='tel']").value;
    let address = document.querySelector("textarea").value;
    let location = document.querySelectorAll("input")[2].value;
    let date = document.querySelector("input[type='date']").value;

    // 🔥 SEND TO BACKEND
    fetch("/post_work", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            phone: phone,
            address: address,
            location: location,
            date: date,
            skills: skills,
            start_time: start,
            end_time: end
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            alert("Work posted successfully!");
            window.location.href = "/cus";
        } else {
            alert("Error saving data!");
        }
    })
    .catch(err => {
        console.log(err);
        alert("Server error!");
    });
}
</script>

</body>
</html>
