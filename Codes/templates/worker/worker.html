<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour Worker Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

/* BACKGROUND */
body{
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:250px;
height:100vh;
background:#0d1b2a;
color:white;
padding:25px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* LOGO */
.logo-container{
text-align:center;
margin-bottom:20px;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:3px solid #1e90ff;
padding:3px;
background:white;
}

.logo-text{
color:#1e90ff;
font-size:20px;
}

/* MENU */
.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:14px;
margin:10px 0;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

.sidebar ul li:hover{
background:#1b263b;
}

/* LOGOUT */
.logout-btn{
background:#1e90ff;
text-align:center;
padding:12px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

.logout-btn:hover{
background:#1565c0;
}

/* MAIN */
.main{
flex:1;
padding:30px;
}

/* HEADER */
.header{
margin-bottom:30px;
}

.header h1{
color:#0d1b2a;
}

/* CARDS GRID */
.cards{
display:grid;

/* ✅ FIXED WIDTH CARDS */
grid-template-columns:repeat(auto-fit, 300px);

/* keep your spacing */
gap:12px;

/* align properly */
justify-content:flex-start;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.3s;

/* ✅ ONLY CHANGE */
max-width:300px;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
font-size:16px;
margin-bottom:8px;
}

.card p{
font-size:13px;
margin:3px 0;
color:#555;
}

/* BUTTON */
.btn{
margin-top:10px;
padding:8px;
border:none;
border-radius:6px;
background:#1e90ff;
color:white;
cursor:pointer;
width:100%;
font-size:13px;
}

.btn:hover{
background:#1565c0;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-box{
background:white;
padding:30px;
border-radius:20px;
width:800px;
max-height:90vh;

/* 🔥 FIX */
display:flex;
flex-direction:column;
justify-content:space-between;

overflow-y:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
position:relative;
}

/* CLOSE */
.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:20px;
cursor:pointer;
}

/* POPUP CONTENT */
.popup-box h2{
margin-bottom:15px;
color:#0d1b2a;
}

.popup-box p{
margin:8px 0;
color:#444;
}

/* SUCCESS BOX */
#successBox{
display:none;
position:fixed;
top:20px;
right:20px;
background:#1e90ff;
color:white;
padding:15px 20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
font-weight:bold;
}

</style>
</head>

<body>

<div class="sidebar">
<div>
<div class="logo-container">
<img src="../static/images/logo.JPG" class="logo">
<div class="logo-text">E-Labour</div>
</div>

<ul>
<li onclick="showSection('dashboard')">🏠 Dashboard</li>
<li onclick="showSection('apply')">📢 Apply Job</li>
<li onclick="showSection('status')">📊 My Status</li>
</ul>
</div>

<div class="logout-btn" onclick="logout()">🚪 Logout</div>
</div>

<div class="main">

<div class="header">
<h1>Worker Dashboard 👷</h1>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="cards">
<div class="card">
<h3>Apply Jobs</h3>
<button class="btn" onclick="showSection('apply')">Apply</button>
</div>

<div class="card">
<h3>Check Status</h3>
<button class="btn" onclick="showSection('status')">View</button>
</div>
</div>
</div>

<!-- APPLY -->
<div id="apply" class="section" style="display:none;">
<h2>Available Jobs</h2><br>
<div class="cards" id="jobsContainer"></div>
</div>

<!-- STATUS -->
<div id="status" class="section" style="display:none;">
<div class="table">
<h3>My Job Status</h3>
<p>Coming soon...</p>
</div>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">

<span class="close-btn" onclick="closePopup()">❌</span>

<div id="popupContent"></div>

</div>
</div>

<!-- SUCCESS -->
<div id="successBox"></div>

<script>

let allJobs = [];

function showSection(sectionId){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(sectionId).style.display='block';

if(sectionId==="apply") loadJobs();
}

function loadJobs(){
fetch("/get_all_jobs")
.then(res=>res.json())
.then(data=>{
allJobs=data;

let c=document.getElementById("jobsContainer");
c.innerHTML="";

data.forEach((job,i)=>{

c.innerHTML+=`
<div class="card">
<h3>🛠 ${job.skills||"Work"}</h3>
<p>👤 ${job.name||"User"}</p>
<p>📍 ${job.location||"Not set"}</p>
<button class="btn" onclick="viewDetails(${i})">View Details</button>
</div>`;
});
});
}

function viewDetails(i){
let j=allJobs[i];

document.getElementById("popupContent").innerHTML=`
<div style="flex:1">

<h2>🛠 ${j.skills}</h2>

<p><b>👤 Name:</b> ${j.name}</p>
<p><b>📞 Phone:</b> ${j.phone}</p>

<p><b>📍 Location:</b> ${j.location}</p>
<p><b>🏠 Address:</b> ${j.address}</p>

<p><b>📅 Date:</b> ${j.date}</p>

<p><b>💰 Salary:</b> ₹${j.salary_min} - ₹${j.salary_max}</p>

<p><b>⏰ Time:</b> ${j.start_time} to ${j.end_time}</p>

<p><b>📝 Description:</b><br>${j.description}</p>

</div>

<button class="btn" onclick="applyJob()">Apply Job</button>
`;

document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function applyJob(){
closePopup();
showSuccess("Applied Successfully ✅");

/* ✅ ONLY CHANGE */
showSection('apply');
}

function showSuccess(msg){
let b=document.getElementById("successBox");
b.innerText=msg;
b.style.display="block";
setTimeout(()=>b.style.display="none",2000);
}

function logout(){
window.location.href="/logout";
}

</script>

</body>
</html>
