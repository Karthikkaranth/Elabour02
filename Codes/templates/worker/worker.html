<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour Worker Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

/* BACKGROUND */
body{
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:250px;
height:100vh;
background:#0d1b2a;
color:white;
padding:25px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* LOGO */
.logo-container{
text-align:center;
margin-bottom:20px;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:3px solid #1e90ff;
padding:3px;
background:white;
}

.logo-text{
color:#1e90ff;
font-size:20px;
}

/* MENU */
.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:14px;
margin:10px 0;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

.sidebar ul li:hover{
background:#1b263b;
}

/* MAIN */
.main{
flex:1;
padding:30px;
}

/* HEADER */
.header{
margin-bottom:30px;
}

.header h1{
color:#0d1b2a;
}

/* CARDS GRID */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit, 300px);
gap:12px;
justify-content:flex-start;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.3s;
max-width:300px;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
font-size:16px;
margin-bottom:8px;
}

.card p{
font-size:13px;
margin:3px 0;
color:#555;
}

/* BUTTON */
.btn{
margin-top:10px;
padding:8px;
border:none;
border-radius:6px;
background:#1e90ff;
color:white;
cursor:pointer;
width:100%;
font-size:13px;
}

.btn:hover{
background:#1565c0;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-box{
background:white;
padding:30px;
border-radius:20px;
width:800px;
max-height:90vh;
display:flex;
flex-direction:column;
justify-content:space-between;
overflow-y:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
position:relative;
}

/* CLOSE */
.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:20px;
cursor:pointer;
}

/* SUCCESS BOX */
#successBox{
display:none;
position:fixed;
top:20px;
right:20px;
background:#1e90ff;
color:white;
padding:15px 20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
font-weight:bold;
}

/* TOP BAR */
.top-bar{
position:fixed;
top:15px;
right:25px;
display:flex;
gap:10px;
z-index:1000;
}

.top-btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.top-btn:hover{transform:scale(1.05);}
.logout-top{background:#ff4d4d;color:white;}
.about-btn{background:#007bff;color:white;}

/* TABLE */
.table-container{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
margin-top:20px;
}

table{width:100%;border-collapse:collapse;}

th{
background:#1e3a8a;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="top-bar">
<button class="top-btn about-btn" onclick="window.location.href='/aboutw'">About</button>
<button class="top-btn logout-top" onclick="logout()">Logout</button>
</div>

<div class="sidebar">
<div>
<div class="logo-container">
<img src="../static/images/logo.JPG" class="logo">
<div class="logo-text">E-Labour</div>
</div>

<ul>
<li onclick="showSection('dashboard')">🏠 Dashboard</li>
<li onclick="showSection('apply')">📢 Apply Job</li>
<li onclick="showSection('status')">📊 My Status</li>
</ul>
</div>
</div>

<div class="main">

<div class="header">
<h1>{{ username }} Dashboard 👷  </h1>
</div>

<div id="dashboard" class="section">
<div class="cards">
<div class="card">
<h3>Apply Jobs</h3>
<button class="btn" onclick="showSection('apply')">Apply</button>
</div>

<div class="card">
<h3>Check Status</h3>
<button class="btn" onclick="showSection('status')">View</button>
</div>
</div>
</div>

<div id="apply" class="section" style="display:none;">
<h2>Available Jobs</h2><br>
<div class="cards" id="jobsContainer"></div>
</div>

<div id="status" class="section" style="display:none;">
<h3>My Job Status</h3>

<div class="table-container">
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Skills</th>
<th>Status</th>
</tr>
</thead>

<tbody id="statusTable"></tbody>
</table>
</div>

</div>

</div>

<div id="popup">
<div class="popup-box">
<span class="close-btn" onclick="closePopup()">❌</span>
<div id="popupContent"></div>
</div>
</div>

<div id="successBox"></div>

<script>

let allJobs = [];

function showSection(sectionId){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(sectionId).style.display='block';

if(sectionId==="apply") loadJobs();
if(sectionId==="status") loadStatus();
}

function loadJobs(){
fetch("/get_all_jobs")
.then(res=>res.json())
.then(data=>{
allJobs=data;

let c=document.getElementById("jobsContainer");
c.innerHTML="";

data.forEach((job,i)=>{
c.innerHTML+=`
<div class="card">
<h3>🛠 ${job.skills||"Work"}</h3>
<p>👤 ${job.name||"User"}</p>
<p>📍 ${job.location||"Not set"}</p>
<button class="btn" onclick="viewDetails(${i})">View Details</button>
</div>`;
});
});
}

function viewDetails(i){
let j=allJobs[i];

document.getElementById("popupContent").innerHTML=`
<h2>🛠 ${j.skills}</h2>
<p><b>Name:</b> ${j.name}</p>
<p><b>Phone:</b> ${j.phone}</p>
<p><b>Location:</b> ${j.location}</p>
<p><b>Address:</b> ${j.address}</p>
<p><b>Date:</b> ${j.date}</p>
<p><b>Salary:</b> ₹${j.salary_min} - ₹${j.salary_max}</p>
<p><b>Time:</b> ${j.start_time} to ${j.end_time}</p>
<p><b>Description:</b> ${j.description}</p>
<button class="btn" onclick="applyJob()">Apply Job</button>
`;

document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function applyJob(){
window.location.href = "/reg";
}

/* ✅ FIXED FUNCTION */
async function loadStatus(){
    let res = await fetch("/worker_status");
    let data = await res.json();

    let table = document.getElementById("statusTable");
    table.innerHTML = "";

    if(data.length === 0){
        table.innerHTML = "<tr><td colspan='4'>No applications</td></tr>";
        return;
    }

    data.forEach(d=>{
        table.innerHTML += `
        <tr>
        <td>${d.name || "-"}</td>
        <td>${d.phone || "-"}</td>
        <td>${(d.skills||[]).join(", ")}</td>
        <td>${d.status || "-"}</td>
        </tr>
        `;
    });
}

function logout(){
sessionStorage.removeItem("username"); // optional cleanup
window.location.href="/logout";
}

</script>

</body>
</html>
