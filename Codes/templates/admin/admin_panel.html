<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
background:#eef2f7;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0f172a;
color:white;
height:100vh;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* LOGO */
.logo-container{
text-align:center;
margin-bottom:20px;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:3px solid #3b82f6;
padding:3px;
background:white;
margin-bottom:10px;
}

/* MENU */
.menu div{
padding:10px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.menu div:hover{
background:#1e293b;
}

/* LOGOUT */
.logout-btn{
background:#ef4444;
text-align:center;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.logout-btn:hover{
background:#dc2626;
}

/* MAIN */
.main{flex:1;padding:20px;}

.header{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

/* STATS */
.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat{
flex:1;
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.stat h2{margin:0;color:#3b82f6;}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{transform:scale(1.03);}

.name{font-weight:bold;}
.phone{color:#64748b;}

/* BUTTONS */
.actions{
margin-top:10px;
display:flex;
justify-content:space-between;
}

button{
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.delete{background:#ef4444;color:white;}
.reset{background:#3b82f6;color:white;}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

/* ERROR */
.error{
color:red;
font-size:13px;
margin-bottom:10px;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 20px;
border-radius:8px;
display:none;
z-index:2000;
}
</style>
</head>

<body>

<div class="sidebar">

<div>
<div class="logo-container">
<img src="../static/images/logo.JPG" class="logo">
<h2>Admin</h2>
</div>

<div class="menu">
<div onclick="setView('all')">📊 Dashboard</div>
<div onclick="setView('worker')">👷 Workers</div>
<div onclick="setView('customer')">🏢 Customers</div>
</div>
</div>

<!-- LOGOUT -->
<div class="logout-btn" onclick="logout()">🚪 Logout</div>

</div>

<div class="main">

<div class="header">E-Labour Admin Dashboard</div>

<div class="stats">
<div class="stat">
<h2 id="totalWorkers">0</h2>
<p>Workers</p>
</div>
<div class="stat">
<h2 id="totalCustomers">0</h2>
<p>Customers</p>
</div>
</div>

<!-- WORKERS -->
<div id="workerSection">
<h3>👷 Workers</h3>
<div id="workerList" class="grid"></div>
</div>

<!-- CUSTOMERS -->
<div id="customerSection">
<h3>🏢 Customers</h3>
<div id="customerList" class="grid"></div>
</div>

</div>

<!-- UPDATE MODAL -->
<div id="updateModal" class="modal">
<div class="modal-box">
<h3>Update User</h3>

<input id="name" placeholder="Username" style="width:100%;padding:8px;margin-bottom:10px;">
<input id="phone" placeholder="Phone" style="width:100%;padding:8px;margin-bottom:10px;">

<div id="errorMsg" class="error"></div>

<button onclick="updateUser()">Update</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
<div class="modal-box">
<h3>Delete Account?</h3>
<p>Are you sure?</p>

<button onclick="confirmDelete()">Delete</button>
<button onclick="closeDelete()">Cancel</button>
</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
let currentId="";
let currentRole="";
let currentView="all";

/* LOGOUT */
function logout(){
window.location.href="/";
}

/* TOAST */
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* VIEW FILTER */
function setView(view){
currentView=view;

if(view==="worker"){
document.getElementById("workerSection").style.display="block";
document.getElementById("customerSection").style.display="none";
}
else if(view==="customer"){
document.getElementById("workerSection").style.display="none";
document.getElementById("customerSection").style.display="block";
}
else{
document.getElementById("workerSection").style.display="block";
document.getElementById("customerSection").style.display="block";
}
}

/* LOAD USERS */
function loadUsers(){
fetch("/admin/get_users")
.then(res=>res.json())
.then(data=>{

document.getElementById("totalWorkers").innerText=data.workers.length;
document.getElementById("totalCustomers").innerText=data.customers.length;

let wList=document.getElementById("workerList");
let cList=document.getElementById("customerList");

wList.innerHTML="";
cList.innerHTML="";

data.workers.forEach(w=>{
wList.innerHTML+=`
<div class="card">
<div class="name">👷 ${w.name}</div>
<div class="phone">📞 ${w.phone}</div>

<div class="actions">
<button class="delete" onclick="openDelete('${w.id}','worker')">Delete</button>
<button class="reset" onclick="openModal('${w.id}','worker','${w.name}','${w.phone}')">Reset</button>
</div>
</div>`;
});

data.customers.forEach(c=>{
cList.innerHTML+=`
<div class="card">
<div class="name">🏢 ${c.name}</div>
<div class="phone">📞 ${c.phone}</div>

<div class="actions">
<button class="delete" onclick="openDelete('${c.id}','customer')">Delete</button>
<button class="reset" onclick="openModal('${c.id}','customer','${c.name}','${c.phone}')">Reset</button>
</div>
</div>`;
});

});
}

/* DELETE */
function openDelete(id,role){
currentId=id;
currentRole=role;
document.getElementById("deleteModal").style.display="flex";
}

function closeDelete(){
document.getElementById("deleteModal").style.display="none";
}

function confirmDelete(){
fetch("/admin/delete_user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:currentId,role:currentRole})
})
.then(res=>res.json())
.then(data=>{
showToast(data.msg);
closeDelete();
loadUsers();
});
}

/* UPDATE */
function openModal(id,role,name,phone){
currentId=id;
currentRole=role;

document.getElementById("name").value=name;
document.getElementById("phone").value=phone;
document.getElementById("errorMsg").innerText="";

document.getElementById("updateModal").style.display="flex";
}

function closeModal(){
document.getElementById("updateModal").style.display="none";
}

function updateUser(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let error=document.getElementById("errorMsg");

if(phone.length!==10 || isNaN(phone)){
error.innerText="Phone must be exactly 10 digits";
return;
}

error.innerText="";

fetch("/admin/update_user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id:currentId,
role:currentRole,
name:name,
phone:phone
})
})
.then(res=>res.json())
.then(data=>{
showToast(data.msg);
closeModal();
loadUsers();
});
}

/* INIT */
loadUsers();
setView("all");
</script>

</body>
</html>
