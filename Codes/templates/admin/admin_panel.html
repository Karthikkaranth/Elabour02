<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
background:#eef2f7;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0f172a;
color:white;
height:100vh;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.menu div{
padding:10px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}
.menu div:hover{background:#1e293b;}

.logout-btn{
background:#ef4444;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

/* MAIN */
.main{flex:1;padding:20px;}

.header{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.name{font-weight:bold;}
.phone{color:#64748b;}

.actions{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.delete{background:#ef4444;color:white;}
.edit{background:#3b82f6;color:white;}
.view{background:#22c55e;color:white;}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-box{
background:white;
padding:20px;
border-radius:12px;
width:500px;
max-height:80vh;
overflow-y:auto;
}

/* POST UI */
.post-card{
background:#f8fafc;
padding:15px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.post-title{
font-weight:bold;
margin-bottom:10px;
}

.post-row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:14px;
}

.label{color:#64748b;}
.value{font-weight:500;}

.post-footer{
text-align:right;
margin-top:10px;
}

/* ALERT */
.alert{
background:#22c55e;
color:white;
padding:10px;
border-radius:8px;
margin-bottom:10px;
display:none;
text-align:center;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="menu">
<div onclick="setView('all')">Dashboard</div>
<div onclick="setView('worker')">Workers</div>
<div onclick="setView('customer')">Customers</div>
</div>

<div class="logout-btn" onclick="logout()">Logout</div>
</div>

<div class="main">

<div class="header">Admin Dashboard</div>

<div id="workerSection">
<h3>Workers</h3>
<div id="workerList" class="grid"></div>
</div>

<div id="customerSection">
<h3>Customers</h3>
<div id="customerList" class="grid"></div>
</div>

</div>

<!-- 🔥 POST MODAL -->
<div id="postModal" class="modal">
<div class="modal-box">

<div id="alertBox" class="alert"></div>

<h3>User Posts</h3>
<div id="postContent"></div>

<br>
<button onclick="closePostModal()">Close</button>
</div>
</div>

<!-- 🔥 EDIT MODAL -->
<div id="editModal" class="modal">
<div class="modal-box">

<h3>Edit User</h3>

<input id="editName" placeholder="Username" style="width:100%;margin-bottom:10px;">
<input id="editPhone" placeholder="Phone" style="width:100%;margin-bottom:10px;">

<button onclick="saveEdit()">Update</button>
<button onclick="closeEdit()">Cancel</button>

</div>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
<div class="modal-box">
<h3>Delete Account?</h3>
<button onclick="confirmDelete()">Delete</button>
<button onclick="closeDelete()">Cancel</button>
</div>
</div>

<script>

let currentId="";
let currentRole="";
let editId="";
let editRole="";

function logout(){ window.location.href="/"; }

function setView(view){
workerSection.style.display="none";
customerSection.style.display="none";

if(view==="worker") workerSection.style.display="block";
else if(view==="customer") customerSection.style.display="block";
else{
workerSection.style.display="block";
customerSection.style.display="block";
}
}

/* LOAD USERS */
function loadUsers(){
fetch("/admin/get_users")
.then(res=>res.json())
.then(data=>{

workerList.innerHTML="";
customerList.innerHTML="";

data.workers.forEach(w=>{
workerList.innerHTML+=createUserCard(w,"worker");
});

data.customers.forEach(c=>{
customerList.innerHTML+=createUserCard(c,"customer");
});
});
}

/* CREATE CARD */
function createUserCard(user,role){

let viewBtn = role==="customer"
? `<button class="view" onclick="viewPosts('${user.name}')">View Posts</button>`
: "";

return `
<div class="card">
<div class="name">${user.name}</div>
<div class="phone">${user.phone}</div>

<div class="actions">
<button class="edit" onclick="openEdit('${user.id}','${role}','${user.name}','${user.phone}')">Edit</button>
<button class="delete" onclick="openDelete('${user.id}','${role}')">Delete</button>
${viewBtn}
</div>
</div>`;
}

/* VIEW POSTS */
function viewPosts(username){

fetch(`/admin/get_posts/${username}`)
.then(res=>res.json())
.then(posts=>{

let container=document.getElementById("postContent");
container.innerHTML="";

if(posts.length===0){
container.innerHTML="<p>User didn’t post anything</p>";
}
else{

posts.forEach(p=>{
container.innerHTML+=`
<div class="post-card">

<div class="post-title">📌 ${p.name}</div>

<div class="post-row"><span class="label">Phone</span><span>${p.phone}</span></div>
<div class="post-row"><span class="label">Address</span><span>${p.address}</span></div>
<div class="post-row"><span class="label">Location</span><span>${p.location}</span></div>
<div class="post-row"><span class="label">Date</span><span>${p.date}</span></div>

<!-- 🔥 NEW FIELDS ADDED -->
<div class="post-row"><span class="label">Description</span><span>${p.description || "N/A"}</span></div>
<div class="post-row"><span class="label">Salary</span><span>₹${p.salary_min || 0} - ₹${p.salary_max || 0}</span></div>

<div class="post-row"><span class="label">Skills</span><span>${p.skills}</span></div>
<div class="post-row"><span class="label">Time</span><span>${p.start_time} - ${p.end_time}</span></div>

<div class="post-footer">
<button class="delete" onclick="takedownPost('${p._id}')">Takedown</button>
</div>

</div>`;
});
}

postModal.style.display="flex";
});
}

/* TAKEDOWN */
function takedownPost(id){
fetch("/admin/delete_post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:id})
})
.then(()=>{
let alertBox=document.getElementById("alertBox");
alertBox.innerText="Post removed successfully";
alertBox.style.display="block";

setTimeout(()=>{
alertBox.style.display="none";
postModal.style.display="none";
loadUsers();
},1500);
});
}

function closePostModal(){
postModal.style.display="none";
}

/* EDIT */
function openEdit(id,role,name,phone){
editId=id;
editRole=role;
editName.value=name;
editPhone.value=phone;
editModal.style.display="flex";
}

function closeEdit(){
editModal.style.display="none";
}

function saveEdit(){
fetch("/admin/update_user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id:editId,
role:editRole,
name:editName.value,
phone:editPhone.value
})
})
.then(()=>{
closeEdit();
loadUsers();
});
}

/* DELETE USER */
function openDelete(id,role){
currentId=id;
currentRole=role;
deleteModal.style.display="flex";
}

function closeDelete(){
deleteModal.style.display="none";
}

function confirmDelete(){
fetch("/admin/delete_user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:currentId,role:currentRole})
})
.then(()=>{
closeDelete();
loadUsers();
});
}

loadUsers();
setView("all");

</script>

</body>
</html>
