<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - E-Labour</title>

<style>

body{
margin:0;
font-family:Segoe UI;
display:flex;
background:#f1f5f9;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0f172a;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.menu{
margin-top:20px;
}

.menu div{
padding:10px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.menu div:hover{
background:#1e293b;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* HEADER */
.header{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

/* STATS */
.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat{
flex:1;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
text-align:center;
}

.stat h2{
margin:0;
color:#3b82f6;
}

/* SECTION */
.section{
margin-top:20px;
}

.section-title{
font-size:18px;
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* NAME */
.name{
font-weight:bold;
font-size:16px;
}

/* PHONE */
.phone{
color:#64748b;
margin:5px 0;
}

/* ACTIONS */
.actions{
margin-top:10px;
display:flex;
justify-content:space-between;
}

button{
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.delete{
background:#ef4444;
color:white;
}

.reset{
background:#3b82f6;
color:white;
}

button:hover{
opacity:0.85;
}

/* EMPTY */
.empty{
color:#888;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>👨‍💼 Admin</h2>
    <div class="menu">
        <div>📊 Dashboard</div>
        <div>👷 Workers</div>
        <div>🏢 Customers</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">E-Labour Admin Dashboard</div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <h2 id="totalWorkers">0</h2>
            <p>Workers</p>
        </div>
        <div class="stat">
            <h2 id="totalCustomers">0</h2>
            <p>Customers</p>
        </div>
    </div>

    <!-- WORKERS -->
    <div class="section">
        <div class="section-title">👷 Workers</div>
        <div id="workerList" class="grid"></div>
    </div>

    <!-- CUSTOMERS -->
    <div class="section">
        <div class="section-title">🏢 Customers</div>
        <div id="customerList" class="grid"></div>
    </div>

</div>

<script>

// LOAD USERS
function loadUsers(){
    fetch("/admin/get_users")
    .then(res => res.json())
    .then(data => {

        let workerList = document.getElementById("workerList");
        let customerList = document.getElementById("customerList");

        workerList.innerHTML = "";
        customerList.innerHTML = "";

        document.getElementById("totalWorkers").innerText = data.workers.length;
        document.getElementById("totalCustomers").innerText = data.customers.length;

        // WORKERS
        if(data.workers.length === 0){
            workerList.innerHTML = "<div class='empty'>No workers found</div>";
        } else {
            data.workers.forEach(w => {
                workerList.innerHTML += `
                <div class="card">
                    <div class="name">👷 ${w.name}</div>
                    <div class="phone">📞 ${w.phone}</div>

                    <div class="actions">
                        <button class="delete" onclick="deleteUser('${w.id}','worker')">Delete</button>
                        <button class="reset" onclick="resetPassword('${w.id}','worker')">Reset</button>
                    </div>
                </div>`;
            });
        }

        // CUSTOMERS
        if(data.customers.length === 0){
            customerList.innerHTML = "<div class='empty'>No customers found</div>";
        } else {
            data.customers.forEach(c => {
                customerList.innerHTML += `
                <div class="card">
                    <div class="name">🏢 ${c.name}</div>
                    <div class="phone">📞 ${c.phone}</div>

                    <div class="actions">
                        <button class="delete" onclick="deleteUser('${c.id}','customer')">Delete</button>
                        <button class="reset" onclick="resetPassword('${c.id}','customer')">Reset</button>
                    </div>
                </div>`;
            });
        }

    });
}


// DELETE
function deleteUser(id, role){
    if(confirm("Delete this account?")){
        fetch("/admin/delete_user", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({id, role})
        })
        .then(res => res.json())
        .then(() => {
            alert("Deleted Successfully");
            loadUsers();
        });
    }
}


// RESET
function resetPassword(id, role){
    fetch("/admin/reset_password", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id, role})
    })
    .then(res => res.json())
    .then(() => {
        alert("Password reset successfully");
    });
}


// INITIAL LOAD
loadUsers();

</script>

</body>
</html>
