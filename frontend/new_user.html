<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#9fb9d3);
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:#ffffff;
width:520px;
padding:60px;
border-radius:22px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.18);
}

.logo{
width:220px;
margin-bottom:25px;
}

h1{
font-size:26px;
margin-bottom:30px;
color:#1565c0;
}

.input-box{
width:100%;
padding:14px;
margin:12px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.signup-btn{
width:100%;
padding:16px;
margin-top:20px;
border-radius:12px;
font-size:17px;
font-weight:600;
cursor:pointer;
border:none;
background:#1565c0;
color:white;
transition:0.3s;
}

.signup-btn:hover{
background:#0d47a1;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo">

<h1>Create Account</h1>

<input type="text" placeholder="Enter Username" class="input-box">

<input type="text" placeholder="Enter Mobile Number" class="input-box">

<button class="signup-btn" onclick="registerUser()">Sign Up</button>

</div>

<script>

function registerUser(){

alert("Registered Successfully!");

window.location.href="register.html";

}

</script>

</body>
</html>
