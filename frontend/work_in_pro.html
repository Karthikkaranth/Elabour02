<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | About</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0d3b66, #1e6091);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    text-align: center;
}

/* Big Heading */
h1 {
    font-size: 60px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

/* Sub text */
p {
    font-size: 28px;
    letter-spacing: 2px;
    opacity: 0.8;
}

/* Simple glow animation */
h1 {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow: 0 0 10px #90e0ef;
    }
    to {
        text-shadow: 0 0 30px #ffffff;
    }
}
</style>
</head>

<body>

<h1>WORK IN PROGRESS</h1>
<p>COMING SOON</p>

</body>
</html>
