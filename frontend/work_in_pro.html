<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Work In Progress</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body{
    margin:0;
    height:100vh;
    background: linear-gradient(135deg,#dbefff,#b3d9ff);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main Box */
.container{
    background:white;
    padding:60px 80px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    border:3px solid #0d3b66;
}

.container h1{
    font-size:40px;
    color:#0d3b66;
    margin-bottom:15px;
}

.container h2{
    font-size:24px;
    color:#555;
    margin-bottom:40px;
}

/* Back Button */
.back-btn{
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background: linear-gradient(90deg,#0d3b66,#1e6091);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">
    <h1>WORK IN PROGRESS</h1>
    <h2>COMING SOON</h2>

    <button class="back-btn" onclick="window.location.href='role.html'">
        ← Back
    </button>
</div>

</body>
</html>
