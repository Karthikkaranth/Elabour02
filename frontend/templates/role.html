<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Select Role</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family: "Segoe UI", Tahoma, sans-serif;
}

body{
margin:0;
height:100vh;
background: linear-gradient(135deg,#dbefff,#b3d9ff);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background: linear-gradient(90deg,#0d3b66,#1e6091);
padding:15px 0;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 20px rgba(0,0,0,0.2);
z-index:10;
}

.brand{
position:absolute;
left:20px;
display:flex;
align-items:center;
}

.brand img{
width:50px;
height:50px;
border-radius:50%;
border:3px solid white;
margin-right:10px;
}

.brand span{
font-size:22px;
font-weight:bold;
color:white;
}

.nav-links{
display:flex;
gap:60px;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.nav-links a:hover{
color:#90e0ef;
}

/* RIGHT LOGO */

.big-logo{
position:fixed;
top:80px;
right:30px;
width:150px;
height:150px;
border-radius:50%;
border:4px solid #0d3b66;
background:white;
object-fit:cover;
box-shadow:0 0 25px rgba(0,0,0,0.25);
z-index:5;
}

/* MAIN BOX */

.main-box{
width:850px;
padding:60px;
border-radius:25px;
background: rgba(255,255,255,0.95);
border:3px solid #0d3b66;
box-shadow:0 0 40px rgba(0,0,0,0.2);
text-align:center;
}

.main-box h1{
font-size:36px;
color:#0d3b66;
margin-bottom:50px;
}

/* ROLE CARDS */

.roles{
display:flex;
justify-content:space-around;
}

.role-card{
width:220px;
height:240px;
background: linear-gradient(145deg,#ffd700,#ffcc00);
border-radius:20px;
box-shadow:0 0 25px rgba(255,204,0,0.6);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.3s;
}

.role-card:hover{
transform:scale(1.08);
}

.role-card img{
width:110px;
margin-bottom:20px;
}

.role-card span{
font-size:20px;
font-weight:bold;
color:#222;
}

.admin-card{
background: linear-gradient(145deg,#111111,#2b2b2b);
box-shadow:0 0 25px rgba(0,0,0,0.7);
}

.admin-card span{
color:#ffd700;
}

.footer{
margin-top:40px;
color:#0d3b66;
}

</style>
</head>

<body>

<div class="navbar">

<div class="brand">
<img src="{{ url_for('static', filename='images/logo.JPG') }}">
<span>E-Labour</span>
</div>

<div class="nav-links">
<a href="#">About</a>
<a href="/">Logout</a>
</div>

</div>

<img src="{{ url_for('static', filename='images/logo.JPG') }}" class="big-logo">

<div class="main-box">

<h1>Select Your Role</h1>

<div class="roles">

<div class="role-card" onclick="location.href='/worker'">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
<span>Worker</span>
</div>

<div class="role-card" onclick="location.href='/customer'">
<img src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png">
<span>User</span>
</div>

<div class="role-card admin-card" onclick="location.href='/admin'">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<span>Admin</span>
</div>

</div>

<div class="footer">
© 2026 E-Labour Project
</div>

</div>

</body>
</html>
