<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | About</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0d3b66, #1e6091);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    text-align: center;
}

/* Big Heading */
h1 {
    font-size: 60px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-transform: uppercase;
    animation: glow 2s infinite alternate;
}

/* Sub text */
p {
    font-size: 28px;
    letter-spacing: 2px;
    opacity: 0.8;
    margin-bottom: 40px;
}

/* Glow animation */
@keyframes glow {
    from {
        text-shadow: 0 0 10px #90e0ef;
    }
    to {
        text-shadow: 0 0 30px #ffffff;
    }
}

/* Back Button */
.back-btn {
    padding: 14px 35px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #ffffff;
    color: #0d3b66;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.back-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<h1>WORK IN PROGRESS</h1>
<p>COMING SOON</p>

<button class="back-btn" onclick="window.location.href='role.html'">
    ← Back
</button>

</body>
</html>
