<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#9fb9d3);
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:#ffffff;
width:520px;
padding:60px;
border-radius:22px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.18);
}

.logo{
width:220px;
margin-bottom:25px;
}

h1{
font-size:26px;
margin-bottom:30px;
color:#1565c0;
}

.input-box{
width:100%;
padding:14px;
margin:12px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.signup-btn{
width:100%;
padding:16px;
margin-top:20px;
border-radius:12px;
font-size:17px;
font-weight:600;
cursor:pointer;
border:none;
background:#1565c0;
color:white;
transition:0.3s;
}

.signup-btn:hover{
background:#0d47a1;
}

</style>
</head>

<body>

<div class="container">

<img src="../static/images/logo.JPG" class="logo">

<h1>Create Account</h1>

<form action="/register" method="POST">

<input type="text" placeholder="Enter Username" name="username" class="input-box" required>

<input type="text" placeholder="Enter Mobile Number" name="mobile" class="input-box" required>

<button type="submit" class="signup-btn">Sign Up</button>

</form>

</div>

</body>
</html>
