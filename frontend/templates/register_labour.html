<!DOCTYPE html>
<html>
<head>
<title>Labour Registration</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#b3d9ff);
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
}

.card{
background:white;
padding:50px;
border-radius:20px;
width:450px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:180px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0d47a1;
}

.error{
color:#d32f2f;
background:#ffebee;
padding:10px;
border-radius:6px;
margin-top:10px;
display:none;
font-size:14px;
}

.success{
color:#2e7d32;
background:#e8f5e9;
padding:10px;
border-radius:6px;
margin-top:10px;
display:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<img src="../static/images/logo.JPG" class="logo">

<h2>Create Labour Account</h2>

<input type="text" placeholder="Full Name" id="name">

<input type="text" placeholder="Mobile Number" id="phone" maxlength="10">

<select id="skill">
<option>Select Skill</option>
<option>Painter</option>
<option>Plumber</option>
<option>Electrician</option>
<option>Construction Worker</option>
</select>

<button onclick="register()">Create Account</button>

<div id="errorMsg" class="error"></div>
<div id="successMsg" class="success"></div>

</div>

<script>

function register(){

let phone = document.getElementById("phone").value;
let error = document.getElementById("errorMsg");
let success = document.getElementById("successMsg");

error.style.display="none";
success.style.display="none";

let phonePattern = /^[0-9]{10}$/;

if(!phonePattern.test(phone)){
error.innerText="⚠ Please enter a valid 10-digit mobile number.";
error.style.display="block";
return;
}

success.innerText="✅ Labour account created successfully!";
success.style.display="block";

setTimeout(()=>{
window.location.href="index.html";
},1500);

}

</script>

</body>
</html>
