<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #dbefff, #b3d9ff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #ffffff;
    width: 500px;
    padding: 50px;
    border-radius: 22px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    text-align: center;
}

.logo {
    width: 210px;
    margin-bottom: 10px;
}

.brand-title {
    font-size: 34px;
    font-weight: 800;
    background: linear-gradient(90deg, #ff6a00, #0056b3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 17px;
    color: #555;
    margin-bottom: 35px;
}

.form-group {
    text-align: left;
    margin-bottom: 22px;
}

label {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
    display: block;
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid #d0d0d0;
    font-size: 16px;
}

.btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #0056b3, #0077cc);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
}

.btn:hover {
    opacity: 0.9;
}

.otp-section {
    display: none;
    margin-top: 25px;
}

.message {
    margin-top: 18px;
    font-size: 16px;
    color: red;
}

.success {
    color: green;
}
</style>
</head>

<body>

<div class="card">

<img src="../static/images/logo.JPG" class="logo">

<div class="brand-title">E-Labour Login</div>
<div class="subtitle">Enter details to get OTP</div>

<!-- USERNAME -->
<div class="form-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter username">
</div>

<!-- PHONE -->
<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone" maxlength="10" placeholder="Enter 10-digit phone number">
</div>

<button class="btn" onclick="sendOTP()">Send OTP</button>

<div class="otp-section" id="otpSection">

<div class="form-group">
<label>Enter OTP</label>
<input type="text" id="otp" maxlength="4" placeholder="Enter OTP">
</div>

<button class="btn" onclick="verifyOTP()">Verify & Login</button>

</div>

<div class="message" id="message"></div>
<div class="message success" id="otpDisplay"></div>

</div>
<script>

let generatedOTP = "";

function sendOTP(){

let username = document.getElementById("username").value;
let phone = document.getElementById("phone").value;

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`username=${username}&mobile=${phone}`

})
.then(res=>res.json())
.then(data=>{

if(data.status==="success"){

generatedOTP = Math.floor(1000 + Math.random()*9000).toString();

document.getElementById("otpDisplay").innerText = "Your OTP: " + generatedOTP;

document.getElementById("otpSection").style.display="block";

document.getElementById("message").innerText="OTP sent successfully";

}
else{

document.getElementById("message").innerText="Invalid username or phone";

}

});

}

function verifyOTP(){

let enteredOTP = document.getElementById("otp").value.trim();
let message = document.getElementById("message");

if(enteredOTP === ""){
message.innerText = "Please enter OTP";
return;
}

if(enteredOTP === generatedOTP){

message.style.color = "green";
message.innerText = "Login successful!";

setTimeout(function(){
window.location.href="/role";
},1000);

}
else{

message.style.color = "red";
message.innerText = "Invalid OTP";

}

}
</script>

</body>
</html>
