<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #dbefff, #b3d9ff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #ffffff;
    width: 500px;
    padding: 50px;
    border-radius: 22px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    text-align: center;
}

.logo {
    width: 210px;
    margin-bottom: 10px;
}

.brand-title {
    font-size: 34px;
    font-weight: 800;
    background: linear-gradient(90deg, #ff6a00, #0056b3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 17px;
    color: #555;
    margin-bottom: 35px;
}

.form-group {
    text-align: left;
    margin-bottom: 22px;
}

label {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
    display: block;
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid #d0d0d0;
    font-size: 16px;
}

.btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #0056b3, #0077cc);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
}

.btn:hover {
    opacity: 0.9;
}

.otp-section {
    display: none;
    margin-top: 25px;
}

.message {
    margin-top: 18px;
    font-size: 16px;
    color: red;
}

.success {
    color: green;
}
</style>
</head>

<body>

<div class="card">

<img src="../static/images/logo.JPG" class="logo">

<div class="brand-title">E-Labour Login</div>
<div class="subtitle">Enter details to get OTP</div>

<!-- USERNAME -->
<div class="form-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter username">
</div>

<!-- PHONE -->
<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone" maxlength="10" placeholder="Enter 10-digit phone number">
</div>

<button class="btn" onclick="sendOTP()">Send OTP</button>

<div class="otp-section" id="otpSection">

<div class="form-group">
<label>Enter OTP</label>
<input type="text" id="otp" maxlength="4" placeholder="Enter OTP">
</div>

<button class="btn" onclick="verifyOTP()">Verify & Login</button>

</div>

<div class="message" id="message"></div>

</div>

<script>

let generatedOTP = "";

function sendOTP(){

let username = document.getElementById("username").value.trim();
let phone = document.getElementById("phone").value.trim();
let message = document.getElementById("message");

let namePattern = /^[A-Za-z\s]+$/;
let phonePattern = /^[0-9]{10}$/;

if(username === "" || phone === ""){
message.textContent = "Please fill all fields.";
message.className = "message";
return;
}

if(!namePattern.test(username)){
message.textContent = "Username must contain letters only.";
message.className = "message";
return;
}

if(!phonePattern.test(phone)){
message.textContent = "Enter a valid 10 digit phone number.";
message.className = "message";
return;
}

generatedOTP = Math.floor(1000 + Math.random()*9000).toString();

alert("Your OTP is: " + generatedOTP);

document.getElementById("otpSection").style.display = "block";

message.textContent = "OTP sent successfully!";
message.className = "message success";

}

function verifyOTP(){

let enteredOTP = document.getElementById("otp").value.trim();
let message = document.getElementById("message");

if(enteredOTP.length !== 4){
message.textContent = "OTP must be 4 digits.";
message.className = "message";
return;
}

if(enteredOTP === generatedOTP){
window.location.href = "role.html";
}
else{
message.textContent = "Invalid OTP. Please try again.";
message.className = "message";
}

}

</script>

</body>
</html>
