<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,sans-serif;
}

/* Background */
body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#dbefff,#9fb9d3);
display:flex;
justify-content:center;
align-items:center;
}

/* Main Card */
.container{
background:#ffffff;
width:520px;
padding:60px;
border-radius:22px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.18);
}

/* Logo */
.logo{
width:220px;
margin-bottom:25px;
}

/* Heading */
h1{
font-size:28px;
margin-bottom:40px;
font-weight:700;
background:linear-gradient(90deg,#ff6a00,#0056b3);
background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Buttons */
.option{
width:100%;
padding:16px;
margin:15px 0;
border-radius:12px;
font-size:17px;
font-weight:600;
cursor:pointer;
border:none;
background:#1565c0;
color:white;
transition:0.3s;
}

.option:hover{
background:#0d47a1;
transform:scale(1.03);
}

</style>
</head>

<body>

<div class="container">

<img src="../static/images/logo.JPG" class="logo">

<h1>E-Labour: Digital Workforce Hiring Application</h1>

<button class="option" onclick="window.location.href='new_user.html'">
New User? Register
</button>

<button class="option" onclick="window.location.href='index.html'">
Already have account? Login
</button>

</div>

</body>
</html>
