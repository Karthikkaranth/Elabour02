<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Labour | Customer Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0d3b66, #1e6091);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGO */
.logo{
position:absolute;
top:20px;
right:25px;
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.customer-card {
    background: #ffffff;
    width: 420px;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.customer-card h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #0d3b66;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: 600;
    font-size: 14px;
    display: block;
    margin-bottom: 6px;
    color: #333;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

textarea {
    resize: none;
    height: 80px;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #0d3b66;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.btn:hover {
    background: #1e6091;
}
</style>
</head>

<body>

<img src="../static/images/logo.JPG" class="logo">

<div class="customer-card">
<h2>Customer Details</h2>

<div class="form-group">
<label>Customer Name</label>
<input type="text" id="name" placeholder="Enter your name">
</div>

<div class="form-group">
<label>Address</label>
<textarea id="address" placeholder="Enter your address"></textarea>
</div>

<div class="form-group">
<label>Available Jobs</label>
<select id="job">
<option value="">-- Select Job --</option>
<option value="Painter">Painter</option>
<option value="Plumber">Plumber</option>
<option value="Electrician">Electrician</option>
<option value="Construction Worker">Construction Worker</option>
</select>
</div>

<button class="btn" onclick="submitForm()">Submit</button>

</div>

<script>

function submitForm(){

let name = document.getElementById("name").value.trim();
let address = document.getElementById("address").value.trim();
let job = document.getElementById("job").value;

let namePattern = /^[A-Za-z ]+$/;

if(name === "" || address === "" || job === ""){
    alert("Please fill all fields before submitting!");
    return;
}

if(!namePattern.test(name)){
    alert("Name should contain only letters!");
    return;
}

alert("Submitted Successfully!");

window.location.href = "role.html";

}

</script>

</body>
</html>
